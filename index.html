<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DuoGym" />
  <meta name="description" content="DuoGym Tracker - Date-based personal gym tracking and exercise diary for Aman and Rishit." />
  <meta name="author" content="DuoGym" />
  <title>DuoGym Tracker</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icon.png" />

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="user-aman"> <!-- Default to Aman's styling -->

  <!-- APP CONTAINER -->
  <div class="app-layout">
    
    <!-- HEADER BAR -->
    <header class="app-header">
      <div class="header-logo">
        <img src="icon.png" class="logo-emoji" alt="DuoGym Logo" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;">
        <div class="logo-text">
          <h1>DuoGym</h1>
          <p>Tracker & Diary</p>
        </div>
      </div>

      <!-- Install App Button (hidden by default, shown when install prompt is available) -->
      <button id="install-app-btn" class="install-btn" onclick="installApp()" style="display: none;">
        <i data-lucide="download"></i> <span class="install-btn-text">Install App</span>
      </button>

      <!-- User profile switcher removed -->
    </header>

    <!-- MAIN APP WRAPPER -->
    <div class="app-body">
      

      <!-- MAIN CONTENT AREA -->
      <main class="app-content">

        <!-- 1. TODAY'S CHECK-IN PAGE -->
        <section id="page-today" class="page-section active">
          <div class="page-header">
            <div>
              <h2 class="page-title">Daily Check-In</h2>
              <p class="page-subtitle">Track your workout for the selected date</p>
            </div>
            
            <!-- Date Navigator -->
            <div class="date-navigator">
              <button class="btn-icon" onclick="adjustDate(-1)" title="Previous Day">
                <i data-lucide="chevron-left"></i>
              </button>
              <div class="date-display-wrapper">
                <span id="checkin-date-text" class="date-text">Monday, 15 June 2026</span>
                <input type="date" id="checkin-date-picker" class="date-picker-hidden" min="2026-06-15" max="2027-06-15" onchange="setDateFromPicker(this.value)">
                <button class="btn-icon-subtle" onclick="triggerDatePicker()" title="Select Custom Date">
                  <i data-lucide="calendar-days"></i>
                </button>
              </div>
              <button class="btn-icon" onclick="adjustDate(1)" title="Next Day">
                <i data-lucide="chevron-right"></i>
              </button>
              <button class="btn btn-secondary btn-sm" onclick="jumpToToday()">Today</button>
            </div>
          </div>

          <!-- Yesterday Missed Notification Banner -->
          <div id="yesterday-missed-banner" class="missed-notification-banner" style="display: none;"></div>

          <!-- CHECK-IN GRID -->
          <div class="dashboard-grid">
            
            <!-- Workout Card -->
            <div class="glass-card workout-main-card">
              <div class="workout-banner">
                <div class="workout-banner-overlay"></div>
                <div class="workout-banner-quote" id="workout-banner-quote">NO EXCUSES. PURE HUSTLE.</div>
              </div>
              <div class="workout-header">
                <span id="workout-day-badge" class="badge">Monday Workout</span>
                <h3 id="workout-name-text">Upper Body</h3>
                <p id="workout-focus-text" class="workout-focus">Chest, Back & Arms</p>
              </div>

              <!-- Today's Progress -->
              <div class="workout-progress-box">
                <div class="progress-info">
                  <span class="progress-title">Completion Progress</span>
                  <span id="workout-progress-percent" class="progress-val">0%</span>
                </div>
                <div class="progress-bar-bg">
                  <div id="workout-progress-fill" class="progress-bar-fill" style="width: 0%"></div>
                </div>
                <p id="workout-count-text" class="progress-count-text">Completed: 0 of 0 exercises</p>
              </div>

              <!-- Exercise Checklist -->
              <div id="checklist-container" class="checklist-items">
                <!-- Populated dynamically via JS -->
              </div>
            </div>
          </div>

        </section>



      </main>
    </div>
  </div>

  <!-- Floating Stopwatch & Timer removed -->

  <!-- Exercise Info Modal Drawer -->
  <div id="exercise-info-modal" class="diet-modal-overlay" onclick="if(event.target === this) closeExerciseInfoModal()" role="dialog" aria-hidden="true" aria-labelledby="ex-modal-title">
    <div class="diet-modal-card" style="max-height: 80vh;">
      <div class="diet-modal-drag"></div>
      <div class="diet-modal-header">
        <h4 id="ex-modal-title" style="display: flex; align-items: center; gap: 8px; margin: 0; font-size: 15px;">
          <i data-lucide="info" style="color: var(--accent); width: 18px; height: 18px;"></i>
          Exercise Steps
        </h4>
        <button class="diet-modal-close-btn" onclick="closeExerciseInfoModal()" title="Close dialog" aria-label="Close details dialog">
          <i data-lucide="x" style="width: 16px; height: 16px;"></i>
        </button>
      </div>
      <div style="overflow-y: auto; padding-right: 4px; display: flex; flex-direction: column; gap: 14px;">
        <h3 id="ex-modal-name" style="font-size: 18px; font-weight: 800; color: var(--text-main); margin: 0;">Push-ups</h3>
        
        <div>
          <h5 style="font-size: 11px; text-transform: uppercase; color: var(--accent); font-weight: 700; letter-spacing: 0.5px; margin: 0 0 6px 0;">How to Perform</h5>
          <ol id="ex-modal-steps" style="font-size: 13px; color: var(--text-sub); padding-left: 16px; line-height: 1.6; display: flex; flex-direction: column; gap: 6px; margin: 0;">
            <!-- Populated dynamically -->
          </ol>
        </div>
        
        <div style="background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 12px;">
          <h5 style="font-size: 11px; text-transform: uppercase; color: var(--success); font-weight: 700; letter-spacing: 0.5px; margin: 0 0 6px 0; display: flex; align-items: center; gap: 4px;">
            <i data-lucide="sparkles" style="width: 12px; height: 12px;"></i> Pro Tips
          </h5>
          <p id="ex-modal-tips" style="font-size: 12px; color: var(--text-sub); line-height: 1.5; margin: 0;"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Main script file -->
  <script src="script.js"></script>
  <script>
    // Initialize icons
    lucide.createIcons();
  </script>
</body>
</html>
